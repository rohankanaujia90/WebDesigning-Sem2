<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chess</title>
    <link rel="stylesheet" href="chess.css">
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <div class="sidebar-logo">
                ♚ <span>ChessApp</span>
            </div>
            <nav class="sidebar-nav">
                <a href="#" class="nav-item active">♟ New Game</a>
                <a href="#" class="nav-item">⚔ Analysis</a>
                <a href="#" class="nav-item">🧩 Puzzles</a>
                <a href="#" class="nav-item">⚙ Settings</a>
            </nav>
            <div class="sidebar-section">
                <h3>Move History</h3>
                <div class="move-list">
                    <div class="move-row">
                        <span class="move-num">1.</span>
                        <span class="move-white">e4</span>
                        <span class="move-black">e5</span>
                    </div>
                    <div class="move-row">
                        <span class="move-num">2.</span>
                        <span class="move-white">Nf3</span>
                        <span class="move-black">Nc6</span>
                    </div>
                    <div class="move-row">
                        <span class="move-num">3.</span>
                        <span class="move-white">Bb5</span>
                        <span class="move-black"></span>
                    </div>
                </div>
            </div>
        </div>
        <div class="board">
            <div class="row row1">
                <div class="cell"><span class="piece black">♜</span></div>
                <div class="cell"><span class="piece black">♞</span></div>
                <div class="cell"><span class="piece black">♝</span></div>
                <div class="cell"><span class="piece black">♛</span></div>
                <div class="cell"><span class="piece black">♚</span></div>
                <div class="cell"><span class="piece black">♝</span></div>
                <div class="cell"><span class="piece black">♞</span></div>
                <div class="cell"><span class="piece black">♜</span></div>
            </div>
            <div class="row row2">
                <div class="cell"><span class="piece black">♟</span></div>
                <div class="cell"><span class="piece black">♟</span></div>
                <div class="cell"><span class="piece black">♟</span></div>
                <div class="cell"><span class="piece black">♟</span></div>
                <div class="cell"><span class="piece black">♟</span></div>
                <div class="cell"><span class="piece black">♟</span></div>
                <div class="cell"><span class="piece black">♟</span></div>
                <div class="cell"><span class="piece black">♟</span></div>
            </div>
            <div class="row row3">
                <div class="cell"></div>
                <div class="cell"></div>
                <div class="cell"></div>
                <div class="cell"></div>
                <div class="cell"></div>
                <div class="cell"></div>
                <div class="cell"></div>
                <div class="cell"></div>
            </div>
            <div class="row row4">
                <div class="cell"></div>
                <div class="cell"></div>
                <div class="cell"></div>
                <div class="cell"></div>
                <div class="cell"></div>
                <div class="cell"></div>
                <div class="cell"></div>
                <div class="cell"></div>
            </div>
            <div class="row row5">
                <div class="cell"></div>
                <div class="cell"></div>
                <div class="cell"></div>
                <div class="cell"></div>
                <div class="cell"></div>
                <div class="cell"></div>
                <div class="cell"></div>
                <div class="cell"></div>
            </div>
            <div class="row row6">
                <div class="cell"></div>
                <div class="cell"></div>
                <div class="cell"></div>
                <div class="cell"></div>
                <div class="cell"></div>
                <div class="cell"></div>
                <div class="cell"></div>
                <div class="cell"></div>
            </div>
            <div class="row row7">
                <div class="cell"><span class="piece white">♙</span></div>
                <div class="cell"><span class="piece white">♙</span></div>
                <div class="cell"><span class="piece white">♙</span></div>
                <div class="cell"><span class="piece white">♙</span></div>

                <div class="cell"><span class="piece white">♙</span></div>
            </div>

                <div class="cell"><span class="piece white">♖</span></div>

                <div class="cell"><span class="piece white">♖</span></div>
            </div>
        </div>

</body>
</html>
